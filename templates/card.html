<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #0E1117;
    }

    .card {
      width: 1080px;
      height: 1350px;
      position: relative;
      display: flex;
      flex-direction: column;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #0E1117;
      overflow: hidden;
    }

    /* ── macOS 윈도우 크롬 바 ────────────────────────── */
    .chrome {
      height: 48px;
      background: #080C12;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .chrome-btn { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .chrome-btn.red    { background: #FF5F57; }
    .chrome-btn.yellow { background: #FEBC2E; }
    .chrome-btn.green  { background: #28C840; }

    .chrome-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }

    /* ── 카드 본체 ───────────────────────────────────── */
    .card-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 60px 80px 56px;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    /* 좌측 accent 라인 (content/outro) */
    .card-inner::before {
      content: '';
      position: absolute;
      left: 0;
      top: 60px;
      bottom: 56px;
      width: 3px;
      background: rgba(255, 107, 107, 0.35);
      border-radius: 0 2px 2px 0;
    }

    /* ── 상단 메타 ───────────────────────────────────── */
    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 56px;
      flex-shrink: 0;
    }

    .card-seq {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 3px;
      font-family: 'Space Mono', monospace;
    }

    .category-pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 100px;
      padding: 7px 18px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
    }

    /* ── 콘텐츠 영역 ─────────────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      min-height: 0;
    }

    .bg-num {
      position: absolute;
      right: -16px;
      bottom: -40px;
      font-size: 280px;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.025);
      line-height: 1;
      letter-spacing: -12px;
      pointer-events: none;
      user-select: none;
      font-family: 'Space Mono', monospace;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: rgba(255, 107, 107, 0.5);
      border-radius: 2px;
      margin-bottom: 32px;
      flex-shrink: 0;
    }

    /* 제목: 코랄 포인트 */
    .card-title {
      font-size: 56px;
      font-weight: 900;
      color: #FF6B6B;
      line-height: 1.3;
      letter-spacing: -1px;
      word-break: keep-all;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .card-body {
      font-size: 25px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.9;
      word-break: keep-all;
      flex-shrink: 0;
    }

    /* ── 키워드 태그 ─────────────────────────────────── */
    .kw-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 32px;
      flex-shrink: 0;
    }

    .kw-tag {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      padding: 6px 16px;
      letter-spacing: 0.3px;
    }

    /* ── 하단 푸터 ───────────────────────────────────── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 40px;
      flex-shrink: 0;
    }

    .brand {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 2px;
      font-family: 'Space Mono', monospace;
    }

    .progress {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      height: 5px;
      width: 5px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
    }

    .dot.on {
      width: 22px;
      background: rgba(255, 107, 107, 0.7);
    }

    /* ════════════════════════════════════════════
       COVER 카드 (index = 1)
       ════════════════════════════════════════════ */
    .cover .card-inner::before { display: none; }

    .cover .card-inner {
      align-items: center;
      padding-top: 68px;
    }

    .cover .meta { justify-content: center; }
    .cover .card-seq { display: none; }

    .cover .content {
      align-items: center;
      text-align: center;
      width: 100%;
    }

    .cover .bg-num { display: none; }

    .cover .divider {
      margin-left: auto;
      margin-right: auto;
      background: rgba(255, 107, 107, 0.4);
    }

    /* 커버 제목: 코랄, 살짝 큰 사이즈 */
    .cover .card-title {
      font-size: 80px;
      color: #FF6B6B;
      line-height: 1.15;
      letter-spacing: -2px;
    }

    .cover .card-body {
      font-size: 26px;
      color: rgba(255, 255, 255, 0.55);
    }

    .cover .kw-tags { justify-content: center; }

    /* 커버 날짜 배지 */
    .date-badge {
      display: none;
      margin-top: 28px;
      padding: 8px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 100px;
    }

    .date-badge-text {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 1.5px;
      font-family: 'Space Mono', monospace;
    }

    .cover .date-badge { display: inline-flex; align-items: center; }

    /* 커버 인스타 핸들 */
    .insta-handle {
      display: none;
      margin-top: 16px;
    }

    .insta-handle-at {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 1px;
      font-family: 'Space Mono', monospace;
    }

    .cover .insta-handle { display: flex; justify-content: center; }

    /* ════════════════════════════════════════════
       OUTRO 카드 (index = 6)
       ════════════════════════════════════════════ */
    .outro .content {
      align-items: center;
      text-align: center;
    }

    .outro .divider {
      margin-left: auto;
      margin-right: auto;
    }

    /* outro 제목도 코랄 */
    .outro .card-title {
      color: #FF6B6B;
    }

    .outro .kw-tags { justify-content: center; }

    .cta-box {
      display: none;
      margin-top: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 18px 40px;
      font-size: 17px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.5px;
    }
    .outro .cta-box { display: block; }

    /* CTA 박스 안 강조 */
    .outro .cta-box strong {
      color: rgba(255, 107, 107, 0.8);
      font-weight: 700;
    }

    /* cover glow 제거 */
    .cover-glow { display: none !important; }
  </style>
</head>
<body>
  <div class="card {{CARD_TYPE}}">

    <div class="cover-glow"></div>

    <!-- macOS 윈도우 크롬 바 -->
    <div class="chrome">
      <div class="chrome-btn red"></div>
      <div class="chrome-btn yellow"></div>
      <div class="chrome-btn green"></div>
      <span class="chrome-label">AI · FINANCE · DEV</span>
    </div>

    <!-- 카드 본체 -->
    <div class="card-inner">

      <!-- 상단 메타 -->
      <div class="meta">
        <span class="card-seq">{{CARD_SEQ}}</span>
        <span class="category-pill">{{CARD_CATEGORY}}</span>
      </div>

      <!-- 콘텐츠 -->
      <div class="content">
        <div class="bg-num">{{CARD_INDEX}}</div>
        <div class="divider"></div>
        <h1 class="card-title">{{CARD_TITLE}}</h1>
        <p class="card-body">{{CARD_BODY}}</p>

        <div class="kw-tags">{{CARD_KEYWORDS}}</div>

        <!-- 커버 전용 -->
        <div class="date-badge">
          <span class="date-badge-text">{{CARD_DATE}}</span>
        </div>
        <div class="insta-handle">
          <span class="insta-handle-at">@findev.ai · 금융권개발자</span>
        </div>

        <!-- 아웃트로 전용 -->
        <div class="cta-box">저장 · 팔로우로 <strong>매일</strong> AI 뉴스 받기 ✓</div>
      </div>

      <!-- 하단 푸터 -->
      <div class="footer">
        <span class="brand">@findev.ai</span>
        <div class="progress">{{PROGRESS_DOTS}}</div>
      </div>

    </div>
  </div>
</body>
</html>
